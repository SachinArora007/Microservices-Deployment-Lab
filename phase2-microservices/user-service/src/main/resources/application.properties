# =============================================================
# User Service Configuration
# File: src/main/resources/application.properties
# =============================================================

# ── Server ────────────────────────────────────────────────────
# This service runs on port 8081
# Port 8080 is reserved for Jenkins!
server.port=8081

# ── Application Name ──────────────────────────────────────────
# Used in logs and actuator info endpoint
spring.application.name=user-service

# ── Logging ───────────────────────────────────────────────────
# Log level: DEBUG shows everything | INFO shows important events | WARN/ERROR for problems
logging.level.root=INFO
logging.level.com.microlab=DEBUG

# Log to file (Jenkins and systemd will also capture stdout)
logging.file.name=/opt/microservices-lab/logs/user-service.log

# Log pattern: timestamp | level | thread | class | message
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── Actuator ──────────────────────────────────────────────────
# Expose health and info endpoints (useful for monitoring)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Service info (visible at /actuator/info)
info.app.name=User Service
info.app.version=1.0.0
info.app.description=Manages users for the Microservices Lab
